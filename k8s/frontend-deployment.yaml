apiVersion: apps/v1
kind: Deployment
metadata:
  name: kbb-frontend
  namespace: default
  labels:
    app: kbb-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kbb-frontend
  template:
    metadata:
      labels:
        app: kbb-frontend
    spec:
      containers:
      - name: frontend
        image: kbb-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "20m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kbb-frontend
  namespace: default
  labels:
    app: kbb-frontend
spec:
  selector:
    app: kbb-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kbb-frontend-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: kbb.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kbb-frontend
            port:
              number: 80
