apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-middleware-sa
  namespace: default
  labels:
    app: k8s-middleware
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-middleware-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: k8s-middleware-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-manager-role
  apiGroup: rbac.authorization.k8s.io
